<style>
body {
    margin:0;
    padding:0;
    background:#fff;
    color:#000;
    font-family:'Orbitron', sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    min-height:100vh;
}

/* شاشة البداية */
.loading-screen {
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#fff;
    z-index:100;
}
.loading-text {
    font-family:'Orbitron', sans-serif;
    font-size:3rem;
    background: linear-gradient(90deg, #000, #00aaff, #000);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradientShift 3s infinite linear;
}
@keyframes gradientShift {
    0% {background-position: 0%;}
    100% {background-position: 200%;}
}

/* المحتوى */
.main-content {
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:50px;
    width: 100%;
}
.gif-container {
    width:100%;
    max-width:600px;
    text-align:center;
    margin-top:30px;

}

/* العنوان */
.sub-title {
    font-size:2rem;
    margin-top:15px;
    text-align:center;
    background: linear-gradient(90deg, #000, #00aaff, #000);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: gradientShift 3s infinite linear;
}

/* صندوق المعلومات */
.info {
    margin-top:30px;
    background:#fff;
    padding:20px;
    border-radius:15px;
    border:2px solid #000;
    width:90%;
    max-width:600px;
    font-size:16px;
    line-height:1.8;
    color:#000;
    text-align:center;
}
.info h3 {
    margin-bottom:10px;
    font-size:1.4rem;
    background: linear-gradient(90deg, #000, #00aaff, #000);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.info span{display:block;margin:5px 0;}

/* الفوتر */
.footer {
    margin-top:25px;
    font-size:1rem;
    background: linear-gradient(90deg, #000, #00aaff, #000);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
</style>
</head>
<body>

<!-- شاشة البداية -->
